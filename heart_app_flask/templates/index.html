<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Heart Risk Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="card">
            <h1>❤️ Heart Disease Risk Predictor</h1>
            <form method="POST">
                <div class="form-group">
                    <label>Age:</label><input name="age" type="number" required>
                    <label>Sex:</label>
                    <select name="sex">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                    <label>Chest Pain Type:</label>
                    <select name="cp">
                        <option value="0">Typical Angina</option>
                        <option value="1">Atypical Angina</option>
                        <option value="2">Non-anginal</option>
                        <option value="3">Asymptomatic</option>
                    </select>
                    <label>Resting BP:</label><input name="trestbps" type="number" required>
                    <label>Cholesterol:</label><input name="chol" type="number" required>
                    <label>Fasting Blood Sugar > 120:</label>
                    <select name="fbs">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                    <label>Resting ECG:</label>
                    <select name="restecg">
                        <option value="0">Normal</option>
                        <option value="1">ST-T Abnormal</option>
                        <option value="2">LV Hypertrophy</option>
                    </select>
                    <label>Max Heart Rate:</label><input name="thalach" type="number" required>
                    <label>Exercise Angina:</label>
                    <select name="exang">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                    <label>ST Depression:</label><input name="oldpeak" type="number" step="0.1" required>
                    <label>Slope:</label>
                    <select name="slope">
                        <option value="0">Upsloping</option>
                        <option value="1">Flat</option>
                        <option value="2">Downsloping</option>
                    </select>
                    <label>Vessels (ca):</label><input name="ca" type="number" min="0" max="3" required>
                    <label>Thal:</label>
                    <select name="thal">
                        <option value="1">Normal</option>
                        <option value="2">Fixed Defect</option>
                        <option value="3">Reversible Defect</option>
                    </select>
                    <button type="submit">🔍 Predict</button>
                </div>
            </form>

            {% if result %}
                <div class="result-box">
                    <h2>{{ result }}</h2>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
